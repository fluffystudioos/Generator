<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: #2a2a35;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    gap: 30px;
    flex-wrap: wrap;
    padding: 40px;
    font-family: sans-serif;
  }
  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  .label {
    color: #fff;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .icon {
    width: 140px;
    height: 140px;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<!-- ═══════════ CARTOON STİLİ ═══════════ -->
<div class="col">
  <div class="label">Cartoon</div>

  <!-- Cartoon Kalp -->
  <div class="icon">
    <svg viewBox="0 0 200 200">
      <defs>
        <radialGradient id="cartHeart" cx="35%" cy="30%" r="80%">
          <stop offset="0%" stop-color="#ff8fa8"/>
          <stop offset="50%" stop-color="#ff3b5c"/>
          <stop offset="100%" stop-color="#c41e3a"/>
        </radialGradient>
        <path id="hPath" d="M100,170 C50,135 20,100 20,65 C20,40 40,25 60,25 C78,25 92,38 100,55 C108,38 122,25 140,25 C160,25 180,40 180,65 C180,100 150,135 100,170 Z"/>
        <clipPath id="hClip"><use href="#hPath"/></clipPath>
      </defs>
      <use href="#hPath" fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linejoin="round"/>
      <use href="#hPath" fill="url(#cartHeart)"/>
      <g clip-path="url(#hClip)">
        <ellipse cx="75" cy="55" rx="40" ry="22" fill="rgba(255,255,255,0.7)" transform="rotate(-20 75 55)"/>
        <ellipse cx="68" cy="50" rx="12" ry="6" fill="#fff" transform="rotate(-25 68 50)"/>
      </g>
    </svg>
  </div>

  <!-- Cartoon Kılıç -->
  <div class="icon">
    <svg viewBox="0 0 200 200">
      <defs>
        <linearGradient id="cartBlade" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="50%" stop-color="#b8c5d6"/>
          <stop offset="100%" stop-color="#5a6a82"/>
        </linearGradient>
        <linearGradient id="cartHandle" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#a05a2c"/>
          <stop offset="100%" stop-color="#5e2f12"/>
        </linearGradient>
        <linearGradient id="cartGuard" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffd966"/>
          <stop offset="100%" stop-color="#b8860b"/>
        </linearGradient>
      </defs>
      <!-- Bıçak -->
      <path d="M100,15 L120,130 L100,145 L80,130 Z" 
            fill="url(#cartBlade)" stroke="#1a1a1a" stroke-width="8" stroke-linejoin="round"/>
      <!-- Parlama -->
      <path d="M95,30 L105,30 L102,120 L98,120 Z" fill="rgba(255,255,255,0.7)"/>
      <!-- Koruma (guard) -->
      <rect x="60" y="135" width="80" height="18" rx="6" 
            fill="url(#cartGuard)" stroke="#1a1a1a" stroke-width="7" stroke-linejoin="round"/>
      <!-- Sap -->
      <rect x="90" y="153" width="20" height="35" 
            fill="url(#cartHandle)" stroke="#1a1a1a" stroke-width="7" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<!-- ═══════════ ANİME STİLİ ═══════════ -->
<div class="col">
  <div class="label">Anime</div>

  <!-- Anime Kalp -->
  <div class="icon">
    <svg viewBox="0 0 200 200">
      <defs>
        <radialGradient id="aniHeart" cx="40%" cy="25%" r="85%">
          <stop offset="0%" stop-color="#ffd6e7"/>
          <stop offset="40%" stop-color="#ff7eb8"/>
          <stop offset="100%" stop-color="#d63384"/>
        </radialGradient>
        <path id="aPath" d="M100,170 C50,135 20,100 20,65 C20,40 40,25 60,25 C78,25 92,38 100,55 C108,38 122,25 140,25 C160,25 180,40 180,65 C180,100 150,135 100,170 Z"/>
        <clipPath id="aClip"><use href="#aPath"/></clipPath>
      </defs>
      <use href="#aPath" fill="none" stroke="#4a1a3a" stroke-width="6" stroke-linejoin="round"/>
      <use href="#aPath" fill="url(#aniHeart)"/>
      <g clip-path="url(#aClip)">
        <ellipse cx="70" cy="55" rx="35" ry="20" fill="rgba(255,255,255,0.8)" transform="rotate(-25 70 55)"/>
        <circle cx="60" cy="48" r="8" fill="#fff"/>
        <circle cx="130" cy="75" r="5" fill="#fff" opacity="0.7"/>
        <circle cx="125" cy="90" r="3" fill="#fff" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <!-- Anime Kılıç -->
  <div class="icon">
    <svg viewBox="0 0 200 200">
      <defs>
        <linearGradient id="aniBlade" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e0f7ff"/>
          <stop offset="50%" stop-color="#9ec5e8"/>
          <stop offset="100%" stop-color="#3a5a8c"/>
        </linearGradient>
      </defs>
      <path d="M100,15 L115,130 L100,140 L85,130 Z" 
            fill="url(#aniBlade)" stroke="#1a2a4a" stroke-width="4" stroke-linejoin="round"/>
      <path d="M98,30 L102,30 L100,125 Z" fill="#fff" opacity="0.8"/>
      <rect x="55" y="135" width="90" height="14" rx="4" 
            fill="#c9a04a" stroke="#1a2a4a" stroke-width="4"/>
      <rect x="92" y="149" width="16" height="38" 
            fill="#8b3a3a" stroke="#1a2a4a" stroke-width="4"/>
      <circle cx="100" cy="190" r="6" fill="#ffd966" stroke="#1a2a4a" stroke-width="3"/>
    </svg>
  </div>
</div>

<!-- ═══════════ RPG STİLİ ═══════════ -->
<div class="col">
  <div class="label">RPG</div>

  <!-- RPG Kalp -->
  <div class="icon">
    <svg viewBox="0 0 200 200">
      <defs>
        <radialGradient id="rpgHeart" cx="35%" cy="30%" r="85%">
          <stop offset="0%" stop-color="#ff5555"/>
          <stop offset="50%" stop-color="#aa1111"/>
          <stop offset="100%" stop-color="#440000"/>
        </radialGradient>
        <radialGradient id="rpgShadow" cx="50%" cy="95%" r="60%">
          <stop offset="0%" stop-color="#000" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>
        <path id="rPath" d="M100,170 C50,135 20,100 20,65 C20,40 40,25 60,25 C78,25 92,38 100,55 C108,38 122,25 140,25 C160,25 180,40 180,65 C180,100 150,135 100,170 Z"/>
        <clipPath id="rClip"><use href="#rPath"/></clipPath>
      </defs>
      <!-- Outline kalın -->
      <use href="#rPath" fill="none" stroke="#0a0000" stroke-width="14" stroke-linejoin="round"/>
      <!-- Ana dolgu -->
      <use href="#rPath" fill="url(#rpgHeart)"/>
      <!-- Alt iç gölge -->
      <g clip-path="url(#rClip)">
        <rect x="0" y="0" width="200" height="200" fill="url(#rpgShadow)"/>
      </g>
      <!-- Üst gloss -->
      <g clip-path="url(#rClip)">
        <ellipse cx="75" cy="55" rx="38" ry="22" fill="rgba(255,255,255,0.5)" transform="rotate(-20 75 55)"/>
        <ellipse cx="68" cy="48" rx="10" ry="5" fill="#fff" opacity="0.95" transform="rotate(-25 68 48)"/>
      </g>
    </svg>
  </div>

  <!-- RPG Kılıç -->
  <div class="icon">
    <svg viewBox="0 0 200 200">
      <defs>
        <linearGradient id="rpgBlade" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="30%" stop-color="#9ab0c8"/>
          <stop offset="70%" stop-color="#4a5a76"/>
          <stop offset="100%" stop-color="#1a2336"/>
        </linearGradient>
        <linearGradient id="rpgGold" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffe066"/>
          <stop offset="50%" stop-color="#d4a017"/>
          <stop offset="100%" stop-color="#7a5a0a"/>
        </linearGradient>
        <linearGradient id="rpgWood" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#8b4a1f"/>
          <stop offset="100%" stop-color="#3a1a08"/>
        </linearGradient>
      </defs>
      <!-- Bıçak (gölge offset) -->
      <path d="M100,18 L122,132 L100,150 L78,132 Z" 
            fill="url(#rpgBlade)" stroke="#000" stroke-width="9" stroke-linejoin="round"/>
      <!-- Bıçak parlaması -->
      <path d="M95,32 L105,32 L102,118 L98,118 Z" fill="#fff" opacity="0.85"/>
      <path d="M88,35 L92,35 L90,100" stroke="#fff" stroke-width="2" opacity="0.5"/>
      <!-- Altın guard -->
      <path d="M55,135 L145,135 L150,148 L140,158 L60,158 L50,148 Z" 
            fill="url(#rpgGold)" stroke="#000" stroke-width="8" stroke-linejoin="round"/>
      <path d="M60,138 L140,138 L142,143 L58,143 Z" fill="#fff" opacity="0.5"/>
      <!-- Sap -->
      <rect x="88" y="158" width="24" height="30" rx="3"
            fill="url(#rpgWood)" stroke="#000" stroke-width="7" stroke-linejoin="round"/>
      <line x1="88" y1="168" x2="112" y2="168" stroke="#2a1005" stroke-width="2"/>
      <line x1="88" y1="178" x2="112" y2="178" stroke="#2a1005" stroke-width="2"/>
      <!-- Pommel (alt topuz) -->
      <circle cx="100" cy="192" r="8" fill="url(#rpgGold)" stroke="#000" stroke-width="6"/>
    </svg>
  </div>
</div>

</body>
</html>
