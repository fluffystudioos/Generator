<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolishUI — UI Style Library + Generator</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Cpath d='M30 65 L50 25 L70 65 M38 50 L62 50' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root[data-theme="light"]{--bg:#fafafa;--bg-2:#fff;--bg-3:#f3f4f6;--hover:#f9fafb;--text:#111827;--text-2:#374151;--muted:#6b7280;--dim:#9ca3af;--border:#e5e7eb;--border-s:#d1d5db;--accent:#3b82f6;--accent-2:#2563eb;--glow:rgba(59,130,246,.15);--success:#10b981;--danger:#ef4444;--warn:#f59e0b;--shadow:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 30px rgba(0,0,0,.12);--canvas:#1a1a1f;--grid:rgba(255,255,255,.04)}
:root[data-theme="dark"]{--bg:#0a0a0b;--bg-2:#111114;--bg-3:#18181b;--hover:#1c1c20;--text:#f4f4f5;--text-2:#d4d4d8;--muted:#a1a1aa;--dim:#71717a;--border:rgba(255,255,255,.08);--border-s:rgba(255,255,255,.16);--accent:#60a5fa;--accent-2:#3b82f6;--glow:rgba(96,165,250,.2);--success:#34d399;--danger:#f87171;--warn:#fbbf24;--shadow:0 4px 12px rgba(0,0,0,.4);--shadow-lg:0 12px 30px rgba(0,0,0,.5);--canvas:#050508;--grid:rgba(255,255,255,.03)}
*{margin:0;padding:0;box-sizing:border-box}html{background:var(--bg)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;transition:background .3s,color .3s}
.topbar{height:54px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:100}
.brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--text);text-decoration:none}
.brand-logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.brand .pro{color:var(--accent)}
.tb-info{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px}
.tb-divider{width:1px;height:22px;background:var(--border)}
.tb-actions{margin-left:auto;display:flex;align-items:center;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg-2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.icon-btn:hover{background:var(--hover);color:var(--text);border-color:var(--border-s)}
.btn-ghost{padding:7px 13px;border-radius:7px;background:transparent;color:var(--text-2);border:1px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-ghost:hover{background:var(--hover);border-color:var(--border-s)}
.workspace{display:grid;grid-template-columns:340px 1fr 300px;height:calc(100vh - 54px)}
.sidebar{background:var(--bg-2);border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:6px}.sidebar::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px}
.layer-tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:0;padding:8px;background:var(--bg-2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.layer-tab{padding:8px 2px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:8px;font-weight:700;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-transform:uppercase;letter-spacing:.3px}
.layer-tab i{font-size:13px}
.layer-tab:hover{color:var(--text);background:var(--bg-3)}
.layer-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--glow)}
.layer-tab.gen-tab.active{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff}
.search-wrap{padding:8px 12px;position:relative;border-bottom:1px solid var(--border);background:var(--bg-2)}
.search-input{width:100%;padding:8px 10px 8px 30px;border:1px solid var(--border);border-radius:7px;background:var(--bg-3);font-size:12px;color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent);background:var(--bg-2)}
.search-wrap i.search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:11px;pointer-events:none}
.cat-strip{display:flex;gap:5px;padding:8px 10px;overflow-x:auto;background:var(--bg-2);border-bottom:1px solid var(--border);scrollbar-width:none}
.cat-strip::-webkit-scrollbar{display:none}
.cat-chip{padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:var(--bg-2);color:var(--text-2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s}
.cat-chip:hover{background:var(--hover);border-color:var(--border-s)}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.lib-section{padding:10px 12px 18px;flex:1}
.lib-section h4{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.lib-section h4 .count{font-family:'JetBrains Mono',monospace;color:var(--dim)}
.lib-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.lib-grid.shapes{grid-template-columns:1fr}
.lib-grid.icons{grid-template-columns:repeat(3,1fr)}
.lib-card{cursor:pointer;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--bg-2);transition:all .2s;position:relative}
.lib-card:hover{transform:translateY(-2px);border-color:var(--border-s);box-shadow:var(--shadow)}
.lib-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow)}
.lib-preview{height:54px;width:100%;display:flex;align-items:center;justify-content:center;background:#1a1a1f;position:relative;overflow:hidden}
.lib-preview .preview-box{width:62px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:5px}
.lib-preview.shape-prev{height:48px;background:#fff}
.lib-preview.icon-prev{height:48px;background:#1a1a1f}
.lib-name{padding:5px 6px;font-size:10px;font-weight:600;color:var(--text-2);text-align:center;font-family:'Space Grotesk',sans-serif;background:var(--bg-2);border-top:1px solid var(--border)}
.lib-card.selected .lib-name{color:var(--accent)}
.fav-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;z-index:2}
.lib-card:hover .fav-btn,.fav-btn.fav-on{opacity:1}
.fav-btn.fav-on{background:#fbbf24}
.empty-state{padding:30px 14px;text-align:center;color:var(--dim);font-size:11px;grid-column:1/-1}
.empty-state i{font-size:24px;display:block;margin-bottom:8px;opacity:.5}

/* GENERATOR PANEL */
.gen-panel{padding:12px;display:flex;flex-direction:column;gap:14px}
.gen-section{background:var(--bg-3);border:1px solid var(--border);border-radius:9px;padding:12px}
.gen-section h5{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.gen-section h5 i{color:var(--accent)}
.gen-mode-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;background:var(--bg-2);padding:3px;border-radius:7px;border:1px solid var(--border);margin-bottom:10px}
.gen-mode-tab{padding:7px 6px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.gen-mode-tab:hover{color:var(--text)}
.gen-mode-tab.active{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;box-shadow:0 2px 8px rgba(139,92,246,.3)}
.gen-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.gen-item{cursor:pointer;border:1px solid var(--border);background:var(--bg-2);border-radius:7px;padding:8px;display:flex;align-items:center;justify-content:center;transition:all .15s;aspect-ratio:1}
.gen-item:hover{border-color:var(--accent);background:var(--hover)}
.gen-item.selected{border-color:var(--accent);background:var(--glow);box-shadow:0 0 0 2px var(--glow)}
.gen-item svg{width:24px;height:24px}
.gen-style-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.gen-style{cursor:pointer;border:1px solid var(--border);background:var(--bg-2);border-radius:7px;padding:8px;text-align:center;font-size:11px;font-weight:600;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.gen-style:hover{border-color:var(--accent)}
.gen-style.selected{border-color:var(--accent);background:var(--glow);color:var(--accent)}
.gen-style .emoji{font-size:18px}
.gen-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.gen-row label{font-size:10px;color:var(--muted);font-weight:600;min-width:60px;text-transform:uppercase;letter-spacing:.5px}
.gen-row input[type="range"]{flex:1;-webkit-appearance:none;height:5px;background:var(--bg-2);border-radius:3px;outline:none;cursor:pointer}
.gen-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg-2)}
.gen-row .val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-2);min-width:36px;text-align:right;font-weight:600}
.gen-row input[type="color"]{width:32px;height:26px;border:none;border-radius:5px;cursor:pointer;background:transparent;padding:0}
.gen-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;font-size:11px;font-weight:600}
.gen-toggle:hover{border-color:var(--accent)}
.gen-toggle.active{background:var(--glow);border-color:var(--accent);color:var(--accent)}
.toggle-switch{width:28px;height:16px;background:var(--bg-3);border-radius:999px;position:relative;transition:all .15s}
.toggle-switch::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--muted);top:2px;left:2px;transition:all .15s}
.gen-toggle.active .toggle-switch{background:var(--accent)}
.gen-toggle.active .toggle-switch::after{background:#fff;left:14px}
.gen-action-btn{width:100%;margin-top:10px;padding:11px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.gen-action-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,.4)}

.main{display:flex;flex-direction:column;overflow:hidden;background:var(--canvas)}
.stage-toolbar{padding:10px 16px;background:var(--bg-2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.element-tabs{display:flex;gap:3px;background:var(--bg-3);padding:3px;border-radius:7px;border:1px solid var(--border);flex-wrap:wrap}
.elem-tab{padding:5px 9px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px}
.elem-tab:hover{color:var(--text)}
.elem-tab.active{background:var(--bg-2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.bg-tabs{display:flex;gap:3px;background:var(--bg-3);padding:3px;border-radius:7px;border:1px solid var(--border)}
.bg-tab{width:24px;height:24px;border-radius:4px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);background:transparent}
.bg-tab:hover{color:var(--text)}
.bg-tab.active{background:var(--bg-2);color:var(--accent)}
.stage-canvas{flex:1;background:var(--canvas);background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:24px 24px;display:flex;align-items:center;justify-content:center;padding:30px;overflow:auto}
.stage-canvas.bg-white{background:#fff;background-image:none}
.stage-canvas.bg-black{background:#000;background-image:none}
.stage-canvas.bg-game{background:linear-gradient(135deg,#1e3c72,#2a5298);background-image:none}
.stage-canvas.bg-anime{background:linear-gradient(135deg,#fbc2eb 0%,#a6c1ee 100%);background-image:none}
#preview-element{position:relative;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);transition:all .3s ease}
#preview-element svg{display:block;max-width:100%;max-height:100%}
.preview-empty{color:rgba(255,255,255,.4);font-size:14px;text-align:center;padding:60px;background:none!important;border:none!important;box-shadow:none!important}
.preview-empty i{font-size:42px;display:block;margin-bottom:12px;opacity:.4}
.preview-empty h2{font-family:'Space Grotesk',sans-serif;font-size:18px;margin-bottom:6px;color:rgba(255,255,255,.7)}
.sidebar-right{background:var(--bg-2);border-left:1px solid var(--border);overflow-y:auto;scrollbar-width:thin}
.sidebar-right::-webkit-scrollbar{width:6px}
.sidebar-right::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:3px}
.layer-stack{padding:12px;border-bottom:1px solid var(--border)}
.layer-stack h3{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.layer-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-3);border:1px solid var(--border);border-radius:7px;margin-bottom:5px;font-size:12px;transition:all .15s}
.layer-item.has-value{border-color:var(--accent);background:rgba(59,130,246,.05)}
.layer-item .layer-icon{width:22px;height:22px;border-radius:5px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.layer-item.has-value .layer-icon{background:var(--accent);color:#fff}
.layer-item .layer-info{flex:1;min-width:0}
.layer-item .layer-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.layer-item .layer-value{font-size:11px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .clear-btn{width:18px;height:18px;border-radius:4px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center}
.layer-item .clear-btn:hover{color:var(--danger);background:var(--hover)}
.props-section{padding:12px;border-bottom:1px solid var(--border)}
.props-section h3{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prop-row label{font-size:10px;color:var(--muted);font-weight:600;min-width:48px;text-transform:uppercase;letter-spacing:.5px}
.prop-row input[type="range"]{flex:1;-webkit-appearance:none;height:5px;background:var(--bg-3);border-radius:3px;outline:none;cursor:pointer}
.prop-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg-2)}
.prop-row .val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-2);min-width:36px;text-align:right;font-weight:600}
.prop-row input[type="color"]{width:28px;height:24px;border:none;border-radius:5px;cursor:pointer;background:transparent;padding:0}
.hue-bar{flex:1;-webkit-appearance:none;height:8px;border-radius:4px;outline:none;cursor:pointer;background:linear-gradient(to right,hsl(0,80%,60%),hsl(60,80%,60%),hsl(120,80%,60%),hsl(180,80%,60%),hsl(240,80%,60%),hsl(300,80%,60%),hsl(360,80%,60%))}
.hue-bar::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:2px solid var(--bg-2)}
.export-panel{padding:12px}
.export-tabs{display:flex;gap:3px;background:var(--bg-3);padding:3px;border-radius:7px;border:1px solid var(--border);margin-bottom:10px}
.export-tab{flex:1;padding:6px 4px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.export-tab:hover{color:var(--text)}
.export-tab.active{background:var(--bg-2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.code-block{background:#0d1117;border:1px solid var(--border);border-radius:7px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#d4d4d8;white-space:pre;overflow-x:auto;line-height:1.5;max-height:260px;overflow-y:auto}
.code-block .k{color:#79b8ff}.code-block .s{color:#9ecbff}.code-block .n{color:#ffab70}.code-block .c{color:#6a737d;font-style:italic}
.code-copy-btn{width:100%;margin-top:8px;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.code-copy-btn:hover{background:var(--accent-2)}
.code-copy-btn.secondary{background:var(--bg-3);color:var(--text);border:1px solid var(--border)}
.copy-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:var(--bg-2);color:var(--muted);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.step-card{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px}
.step-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.step-title{font-weight:700;font-size:12px}
.step-badge{margin-left:auto;font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600;background:var(--bg-2);padding:2px 7px;border-radius:999px;border:1px solid var(--border)}
.step-desc{font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.6;padding:6px 8px;background:var(--bg-2);border-radius:5px;border:1px solid var(--border)}
.step-desc b{color:var(--text)}
.step-desc .arrow{color:var(--accent);font-weight:900;margin:0 3px}
.color-row{display:flex;align-items:center;gap:6px;padding:5px;background:var(--bg-2);border:1px solid var(--border);border-radius:5px;margin-bottom:4px}
.color-row .swatch{width:24px;height:24px;border-radius:4px;border:1px solid var(--border-s);flex-shrink:0}
.color-row .info{flex:1;min-width:0}
.color-row .info .lbl{font-size:9px;color:var(--muted);font-weight:600}
.color-row .info .val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600}
.kv-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--bg-2);border:1px solid var(--border);border-radius:5px;margin-bottom:4px;font-size:11px}
.kv-row .k{color:var(--muted);font-size:10px;font-weight:600}
.kv-row .v{font-family:'JetBrains Mono',monospace;font-weight:600}
.toast-stack{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column-reverse;gap:8px;z-index:9999;pointer-events:none}
.toast{background:var(--bg-2);border:1px solid var(--border);box-shadow:var(--shadow-lg);border-radius:9px;padding:11px 14px;display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;animation:slideIn .3s ease,fadeOut .3s 2s ease forwards;pointer-events:all}

function hslToHex(h,s,l){h=((h%360)+360)%360;l/=100;const a=s*Math.min(l,1-l)/100;const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};return`#${f(0)}${f(8)}${f(4)}`;}
function hexToHsl(hex){hex=hex.replace('#','');let r=parseInt(hex.substr(0,2),16)/255,g=parseInt(hex.substr(2,2),16)/255,b=parseInt(hex.substr(4,2),16)/255;let max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max==min){h=s=0;}else{let d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};}
function shiftH(h){let v=h;if(STATE.tintEnabled&&STATE.tintHue!==null){v=((v-215+STATE.tintHue)%360+360)%360;}return((v+STATE.hueShift)%360+360)%360;}
function hex(h,s,l){return hslToHex(shiftH(h),s,l);}

const GEN_SHAPES=[

function genShape(type,opts){
  const c=opts.color||'#000';
  const w=400,h=opts.height||60;
  if(type==='gen-divider'){
    const spikes=opts.spikes||4;
    let path=`M10,${h/2}`;
    const seg=(w-20)/(spikes*2);
    for(let i=0;i<spikes;i++){
      const x1=10+seg*(i*2+1);
      const x2=10+seg*(i*2+2);
      path+=` L${x1-seg*0.3},${h/2-opts.height*0.3} L${x1},${h/2} L${x1+seg*0.3},${h/2+opts.height*0.3} L${x2},${h/2}`;
    }
    path+=` L${w-10},${h/2}`;
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}"><circle cx="5" cy="${h/2}" r="${opts.dotSize||4}" fill="${c}"/><path d="${path}" stroke="${c}" stroke-width="${opts.thickness||2}" fill="none"/><circle cx="${w-5}" cy="${h/2}" r="${opts.dotSize||4}" fill="${c}"/></svg>`;
  }
  if(type==='gen-banner'){
    const cut=opts.cutSize||30;
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}"><polygon points="0,${h/2} ${cut},0 ${w-cut},0 ${w},${h/2} ${w-cut},${h} ${cut},${h}" fill="${c}" stroke="${opts.outline?'#000':'none'}" stroke-width="${opts.outlineWidth||2}"/></svg>`;
  }
  if(type==='gen-frame'){
    const r=opts.cornerRadius||0;
    const t=opts.thickness||3;
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}"><rect x="${t}" y="${t}" width="${w-t*2}" height="${h-t*2}" rx="${r}" fill="none" stroke="${c}" stroke-width="${t}"/>${opts.double?`<rect x="${t+6}" y="${t+6}" width="${w-t*2-12}" height="${h-t*2-12}" rx="${Math.max(0,r-3)}" fill="none" stroke="${c}" stroke-width="1"/>`:''}${opts.corners?`<circle cx="${t}" cy="${t}" r="5" fill="${c}"/><circle cx="${w-t}" cy="${t}" r="5" fill="${c}"/><circle cx="${t}" cy="${h-t}" r="5" fill="${c}"/><circle cx="${w-t}" cy="${h-t}" r="5" fill="${c}"/>`:''}</svg>`;
  }
  if(type==='gen-label'){
    const r=opts.cornerRadius||20;
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}"><rect x="5" y="5" width="${w-10}" height="${h-10}" rx="${r}" fill="${c}" stroke="${opts.outline?'#000':'none'}" stroke-width="${opts.outlineWidth||3}"/></svg>`;
  }
  return '';
}

function setGenMode(m){STATE.genMode=m;renderSidebar();if(m==='shape')generateShape();else generateIcon();}
function setGenIcon(id){STATE.genIconId=id;renderSidebar();generateIcon();}
function setGenStyle(id){STATE.genStyle=id;renderSidebar();generateIcon();}
function setGenShape(id){STATE.genShapeId=id;renderSidebar();generateShape();}

function generateIcon(){
  const ic=GEN_ICONS.find(i=>i.id===STATE.genIconId);
  const st=GEN_STYLES.find(s=>s.id===STATE.genStyle);
  if(!ic||!st)return;
  STATE.generatedSvg=st.apply(ic.path,STATE.genColor,{outline:STATE.genOutline,glow:STATE.genGlow,highlight:STATE.genHighlight});
  STATE.generatedType='icon';
  showGeneratedInPreview();
}

function generateShape(){
  STATE.generatedSvg=genShape(STATE.genShapeId,{color:STATE.genShapeColor,height:STATE.genShapeHeight,spikes:STATE.genShapeSpikes,thickness:STATE.genShapeThickness,dotSize:STATE.genShapeDotSize,cutSize:STATE.genShapeCutSize,cornerRadius:STATE.genShapeRadius,double:STATE.genShapeDouble,corners:STATE.genShapeCorners,outline:STATE.genShapeOutline,outlineWidth:STATE.genShapeOutlineWidth});
  STATE.generatedType='shape';
  showGeneratedInPreview();
}

function showGeneratedInPreview(){
  const el=document.getElementById('preview-element');
  el.innerHTML='';el.style.cssText='';
  if(STATE.generatedType==='icon'){el.style.width='180px';el.style.height='180px';}
  else{el.style.width='90%';el.style.maxWidth='500px';}
  el.innerHTML=STATE.generatedSvg;
  renderExport();
}

function applyGeneratedIcon(){
  STATE.activeIcon='gen-'+Date.now();
  GEN_ICONS_DYNAMIC[STATE.activeIcon]={name:'Custom Icon',svg:()=>STATE.generatedSvg};
  renderLayerStack();
  toast('Icon applied!','success');
}
function applyGeneratedShape(){
  STATE.activeShape='gen-'+Date.now();
  GEN_SHAPES_DYNAMIC[STATE.activeShape]={name:'Custom Shape',svg:()=>STATE.generatedSvg};
  renderLayerStack();
  toast('Shape applied!','success');
}
const GEN_ICONS_DYNAMIC={},GEN_SHAPES_DYNAMIC={};

function renderCategories(){
  const cats=STATE.currentLayer==='stroke'?STROKE_CATEGORIES:STATE.currentLayer==='fill'?FILL_CATEGORIES:STATE.currentLayer==='shapes'?SHAPE_CATEGORIES:STATE.currentLayer==='icons'?ICON_CATEGORIES:[{id:'all',name:'All',emoji:'🎯'}];
  document.getElementById('cat-strip').innerHTML=cats.map(c=>`<button class="cat-chip ${STATE.currentCategory===c.id?'active':''}" onclick="selectCat('${c.id}')">${c.emoji} ${c.name}</button>`).join('');
}
function selectCat(catId){STATE.currentCategory=catId;renderCategories();renderLibrary();}

function getItems(){
  let items=STATE.currentLayer==='stroke'?STROKES:STATE.currentLayer==='fill'?FILLS:STATE.currentLayer==='shapes'?SHAPES:STATE.currentLayer==='icons'?ICONS:COMBOS;
  if(STATE.currentCategory!=='all'&&STATE.currentLayer!=='combos'){items=items.filter(i=>i.cat===STATE.currentCategory);}
  if(STATE.searchQuery){const q=STATE.searchQuery.toLowerCase();items=items.filter(i=>i.name.toLowerCase().includes(q));}
  return items;
}

function renderLibrary(){
  const items=getItems();
  document.getElementById('lib-count').textContent=items.length;
  const headings={stroke:'Strokes',fill:'Fills',shapes:'Shapes',icons:'Icons',combos:'Saved'};
  document.getElementById('lib-heading').textContent=headings[STATE.currentLayer]||'Items';
  const grid=document.getElementById('lib-grid');
  grid.className='lib-grid '+(STATE.currentLayer==='shapes'?'shapes':STATE.currentLayer==='icons'?'icons':'');
  if(!items.length){grid.innerHTML=`<div class="empty-state"><i class="fa-regular fa-folder-open"></i>${STATE.currentLayer==='combos'?'No saved combos':'No items found'}</div>`;return;}
  grid.innerHTML=items.map(item=>{
    const isActive=(STATE.currentLayer==='stroke'&&STATE.activeStroke===item.id)||(STATE.currentLayer==='fill'&&STATE.activeFill===item.id)||(STATE.currentLayer==='shapes'&&STATE.activeShape===item.id)||(STATE.currentLayer==='icons'&&STATE.activeIcon===item.id);
    if(STATE.currentLayer==='combos')return `<div class="lib-card" onclick="loadCombo('${item.id}')"><div class="lib-preview"><div class="preview-box" style="background:linear-gradient(135deg,#444,#888);"></div></div><div class="lib-name">${item.name}</div></div>`;
    return `<div class="lib-card ${isActive?'selected':''}" onclick="selectItem('${item.id}')"><div class="lib-preview ${STATE.currentLayer==='shapes'?'shape-prev':STATE.currentLayer==='icons'?'icon-prev':''}">${renderCardPreview(item)}</div><div class="lib-name">${item.name}</div></div>`;
  }).join('');
}

function renderCardPreview(item){
  if(STATE.currentLayer==='stroke'){const css=item.build(2);const styleStr=Object.entries(css).map(([k,v])=>`${kebab(k)}:${v}`).join(';');return `<div class="preview-box" style="${styleStr};background:rgba(255,255,255,0.05);"></div>`;}
  if(STATE.currentLayer==='fill'){const css=item.build();const styleStr=Object.entries(css).map(([k,v])=>`${kebab(k)}:${v}`).join(';');return `<div class="preview-box" style="${styleStr}"></div>`;}
  if(STATE.currentLayer==='shapes')return `<div style="width:90%;height:90%;display:flex;align-items:center;justify-content:center;">${item.svg('#222')}</div>`;
  if(STATE.currentLayer==='icons')return `<div style="width:42px;height:42px;display:flex;align-items:center;justify-content:center;">${item.svg('#fff')}</div>`;
  return '';
}
function kebab(s){return s.replace(/[A-Z]/g,m=>'-'+m.toLowerCase());}

function selectItem(itemId){
  if(STATE.currentLayer==='stroke')STATE.activeStroke=itemId;
  else if(STATE.currentLayer==='fill')STATE.activeFill=itemId;
  else if(STATE.currentLayer==='shapes')STATE.activeShape=itemId;
  else if(STATE.currentLayer==='icons')STATE.activeIcon=itemId;
  renderLibrary();applyToPreview();renderLayerStack();renderExport();
}

function clearLayer(layer){
  if(layer==='stroke')STATE.activeStroke=null;
  else if(layer==='fill')STATE.activeFill=null;
  else if(layer==='shape')STATE.activeShape=null;
  else if(layer==='icon')STATE.activeIcon=null;
  renderLibrary();applyToPreview();renderLayerStack();renderExport();
  toast(layer+' cleared','info');
}

function renderLayerStack(){
  const stroke=STROKES.find(s=>s.id===STATE.activeStroke);
  const fill=FILLS.find(f=>f.id===STATE.activeFill);
  const shape=SHAPES.find(s=>s.id===STATE.activeShape)||GEN_SHAPES_DYNAMIC[STATE.activeShape];
  const icon=ICONS.find(i=>i.id===STATE.activeIcon)||GEN_ICONS_DYNAMIC[STATE.activeIcon];
  document.getElementById('stroke-val').textContent=stroke?stroke.name:'None';
  document.getElementById('fill-val').textContent=fill?fill.name:'None';
  document.getElementById('shape-val').textContent=shape?shape.name:'None';
  document.getElementById('icon-val').textContent=icon?icon.name:'None';
  document.getElementById('layer-stroke').classList.toggle('has-value',!!stroke);
  document.getElementById('layer-fill').classList.toggle('has-value',!!fill);
  document.getElementById('layer-shape').classList.toggle('has-value',!!shape);
  document.getElementById('layer-icon').classList.toggle('has-value',!!icon);
}

function getFillColor(){
  const fill=FILLS.find(f=>f.id===STATE.activeFill);
  if(!fill)return '#3a3a55';
  const fc=fill.build();const bg=fc.background||fc.backgroundColor||'';
  if(bg&&!bg.includes('gradient'))return bg;
  if(bg){const m=bg.match(/#[0-9a-fA-F]{6}/);if(m)return m[0];}
  return '#3a3a55';
}

function applyToPreview(){
  const el=document.getElementById('preview-element');
  if(!STATE.activeStroke&&!STATE.activeFill&&!STATE.activeShape&&!STATE.activeIcon){
    el.innerHTML=`<div class="preview-empty"><i class="fa-solid fa-layer-group"></i><h2>Welcome to PolishUI 2.0</h2><div>Pick from Library OR use Generator</div></div>`;
    el.style.cssText='';return;
  }
  const shape=SHAPES.find(s=>s.id===STATE.activeShape)||GEN_SHAPES_DYNAMIC[STATE.activeShape];
  const icon=ICONS.find(i=>i.id===STATE.activeIcon)||GEN_ICONS_DYNAMIC[STATE.activeIcon];
  const stroke=STROKES.find(s=>s.id===STATE.activeStroke);
  const fill=FILLS.find(f=>f.id===STATE.activeFill);
  const fillCol=getFillColor();
  if(shape){el.innerHTML='';el.style.cssText='';el.style.maxWidth='90%';el.style.maxHeight='400px';el.innerHTML=shape.svg(fillCol);return;}
  if(icon){el.innerHTML='';el.style.cssText='';el.style.width='180px';el.style.height='180px';let filters=[];if(stroke){const sc=stroke.build(2);if(sc.boxShadow){const m=sc.boxShadow.match(/#[0-9a-fA-F]{6}/g)||[];m.forEach(c=>filters.push(`drop-shadow(0 0 6px ${c})`));}}if(filters.length)el.style.filter=filters.join(' ');el.innerHTML=icon.svg(fillCol);return;}
  const configs={button:{w:'180px',h:'56px',text:'Button',fs:'14px'},card:{w:'260px',h:'320px',text:'Card',fs:'16px'},frame:{w:'340px',h:'200px',text:'Frame',fs:'14px'},badge:{w:'100px',h:'34px',text:'NEW',fs:'11px'},banner:{w:'320px',h:'60px',text:'BANNER',fs:'14px'}};
  const cfg=configs[STATE.currentElement];
  el.innerHTML='';el.style.cssText='';
  el.style.width=cfg.w;el.style.height=cfg.h;el.style.fontSize=cfg.fs;
  el.style.display='flex';el.style.alignItems='center';el.style.justifyContent='center';
  el.style.color='#fff';el.style.fontWeight='700';el.style.borderRadius='8px';
  if(stroke){const css=stroke.build(2);Object.entries(css).forEach(([k,v])=>el.style[k]=v);}
  if(fill){const css=fill.build();Object.entries(css).forEach(([k,v])=>el.style[k]=v);}
  else el.style.background='rgba(60,60,80,0.85)';
  el.textContent=cfg.text;
}

document.querySelectorAll('.layer-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.layer-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');STATE.currentLayer=btn.dataset.layer;STATE.currentCategory='all';renderSidebar();if(STATE.currentLayer==='generator'){if(!STATE.genMode)STATE.genMode='icon';generateIcon();}});});
document.querySelectorAll('.elem-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.elem-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');STATE.currentElement=btn.dataset.element;applyToPreview();});});
document.querySelectorAll('.bg-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.bg-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');STATE.bg=btn.dataset.bg;const canvas=document.getElementById('stage-canvas');canvas.className='stage-canvas';canvas.classList.add('bg-'+STATE.bg);});});
document.getElementById('hue-slider').addEventListener('input',e=>{STATE.hueShift=parseInt(e.target.value);document.getElementById('hue-val').textContent=STATE.hueShift+'°';renderLibrary();applyToPreview();renderExport();});
document.getElementById('tint-color').addEventListener('input',e=>{STATE.tintHue=hexToHsl(e.target.value).h;STATE.tintEnabled=true;renderLibrary();applyToPreview();renderExport();});
function resetTint(){STATE.tintEnabled=false;STATE.tintHue=null;document.getElementById('tint-color').value='#3b82f6';renderLibrary();applyToPreview();renderExport();}
function randomCombo(){STATE.activeStroke=STROKES[Math.floor(Math.random()*STROKES.length)].id;STATE.activeFill=FILLS[Math.floor(Math.random()*FILLS.length)].id;renderLibrary();applyToPreview();renderLayerStack();renderExport();toast('🎲 Random!','success');}
function loadCombo(comboId){const c=COMBOS.find(x=>x.id===comboId);if(!c)return;STATE.activeStroke=c.stroke;STATE.activeFill=c.fill;applyToPreview();renderLayerStack();renderExport();}
document.querySelectorAll('.export-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.export-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');STATE.exportTab=btn.dataset.tab;renderExport();});});

function renderExport(){
  const body=document.getElementById('export-body');
  if(STATE.generatedSvg&&STATE.currentLayer==='generator'){
    if(STATE.exportTab==='svg'||STATE.exportTab==='figma'){
      body.innerHTML=`<div class="step-card"><div class="step-head"><div class="step-num">1</div><div class="step-title">${STATE.exportTab==='figma'?'PASTE IN FIGMA':'COPY SVG'}</div></div><div class="step-desc">${STATE.exportTab==='figma'?'Click <b>Copy SVG</b> <span class="arrow">→</span> Open Figma <span class="arrow">→</span> Press <b>Ctrl+V</b><br>Generated SVG pastes as <b style="color:var(--accent);">editable vector!</b>':'Generated SVG ready to use anywhere'}</div><div class="code-block">${escapeHtml(STATE.generatedSvg)}</div></div><button class="code-copy-btn" onclick='copyText(${JSON.stringify(STATE.generatedSvg)})'><i class="fa-solid fa-copy"></i> Copy SVG</button><button class="code-copy-btn secondary" onclick="downloadGenSvg()" style="margin-top:6px;"><i class="fa-solid fa-download"></i> Download SVG</button>`;
      return;
    }
  }
  const stroke=STROKES.find(s=>s.id===STATE.activeStroke);
  const fill=FILLS.find(f=>f.id===STATE.activeFill);
  const shape=SHAPES.find(s=>s.id===STATE.activeShape)||GEN_SHAPES_DYNAMIC[STATE.activeShape];
  const icon=ICONS.find(i=>i.id===STATE.activeIcon)||GEN_ICONS_DYNAMIC[STATE.activeIcon];
  if(!stroke&&!fill&&!shape&&!icon){body.innerHTML=`<div style="padding:30px 0;text-align:center;color:var(--dim);font-size:11px;"><i class="fa-solid fa-code" style="display:block;font-size:22px;margin-bottom:8px;opacity:.4;"></i>Select layers to see code</div>`;return;}
  if(STATE.exportTab==='figma')body.innerHTML=renderFigma(stroke,fill,shape,icon);
  else if(STATE.exportTab==='svg')body.innerHTML=renderSvgTab(stroke,fill,shape,icon);
  else body.innerHTML=renderCss(stroke,fill);
}

function renderFigma(stroke,fill,shape,icon){
  let html='';let n=1;
  const fillCol=getFillColor();
  if(shape||icon){
    const item=shape||icon;
    const svgCode=item.svg(fillCol);
    html+=`<div class="step-card"><div class="step-head"><div class="step-num">${n++}</div><div class="step-title">${shape?'PASTE SHAPE':'PASTE ICON'}</div></div><div class="step-desc">Click <b>Copy SVG</b> <span class="arrow">→</span> Figma <span class="arrow">→</span> <b>Ctrl+V</b><br>Pastes as <b style="color:var(--accent);">editable vector!</b></div><button class="code-copy-btn" onclick='copyText(${JSON.stringify(svgCode)})'><i class="fa-solid fa-code"></i> Copy SVG</button></div>`;
    return html;
  }
  if(fill){const fc=fill.build();const bg=fc.background||fc.backgroundColor||'';const colors=bg.match(/#[0-9a-fA-F]{6}/g)||[];const isGrad=bg.includes('gradient');html+=`<div class="step-card"><div class="step-head"><div class="step-num">${n++}</div><div class="step-title">FILL</div></div><div class="step-desc">Right panel <b>Fill</b> <span class="arrow">→</span> <b style="color:var(--accent);">+</b></div>`;if(isGrad){html+=`<div class="kv-row"><span class="k">Type</span><span class="v">Gradient</span></div>`;colors.forEach((c,i)=>{html+=`<div class="color-row"><div class="swatch" style="background:${c}"></div><div class="info"><div class="lbl">Stop ${i+1}</div><div class="val">${c.toUpperCase()}</div></div><button class="copy-btn" onclick="copyText('${c.toUpperCase()}')"><i class="fa-regular fa-copy"></i></button></div>`;});}else{const c=colors[0]||'#666';html+=`<div class="color-row"><div class="swatch" style="background:${c}"></div><div class="info"><div class="lbl">Color</div><div class="val">${c.toUpperCase()}</div></div><button class="copy-btn" onclick="copyText('${c.toUpperCase()}')"><i class="fa-regular fa-copy"></i></button></div>`;}html+=`</div>`;}
  if(stroke){const sc=stroke.build(2);let strokeC='#C0C0C0';if(sc.border){const m=sc.border.match(/(\d+(?:\.\d+)?)px\s+\w+\s+(#[0-9a-fA-F]{6})/);if(m){strokeC=m[2];}}html+=`<div class="step-card"><div class="step-head"><div class="step-num">${n++}</div><div class="step-title">STROKE</div></div><div class="step-desc">Right panel <b>Stroke</b> <span class="arrow">→</span> <b style="color:var(--accent);">+</b></div><div class="color-row"><div class="swatch" style="background:${strokeC}"></div><div class="info"><div class="lbl">Color</div><div class="val">${strokeC.toUpperCase()}</div></div><button class="copy-btn" onclick="copyText('${strokeC.toUpperCase()}')"><i class="fa-regular fa-copy"></i></button></div></div>`;}
  return html;
}
function renderSvgTab(stroke,fill,shape,icon){const item=shape||icon;if(!item)return `<div style="padding:24px 0;text-align:center;color:var(--dim);font-size:11px;">Select Shape or Icon</div>`;const fillCol=getFillColor();const svgCode=item.svg(fillCol);return `<div class="code-block">${escapeHtml(svgCode)}</div><button class="code-copy-btn" onclick='copyText(${JSON.stringify(svgCode)})'><i class="fa-solid fa-copy"></i> Copy SVG</button>`;}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function downloadGenSvg(){if(!STATE.generatedSvg)return;const blob=new Blob([STATE.generatedSvg],{type:'image/svg+xml'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='polishui-generated.svg';a.click();URL.revokeObjectURL(url);toast('Downloaded!','success');}
function renderCss(stroke,fill){let css='.polish-style {\n';if(fill){const fc=fill.build();Object.entries(fc).forEach(([k,v])=>{css+=`  ${kebab(k)}: ${v};\n`;});}if(stroke){const sc=stroke.build(2);Object.entries(sc).forEach(([k,v])=>{css+=`  ${kebab(k)}: ${v};\n`;});}css+=`  border-radius: 8px;\n}`;return `<div class="code-block">${highlightCss(css)}</div><button class="code-copy-btn" onclick="copyText(${JSON.stringify(css)})"><i class="fa-solid fa-copy"></i> Copy CSS</button>`;}
function highlightCss(css){return css.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/([a-z-]+)(\s*):/g,'<span class="k">$1</span>$2:').replace(/(#[0-9a-fA-F]{3,8})/g,'<span class="n">$1</span>').replace(/(\d+(?:\.\d+)?(?:px|%|deg)?)/g,'<span class="n">$1</span>');}
function copyText(text){navigator.clipboard.writeText(text).then(()=>toast('Copied!','success'));}
function toggleTheme(){const html=document.documentElement;const cur=html.getAttribute('data-theme');const nx=cur==='light'?'dark':'light';html.setAttribute('data-theme',nx);localStorage.setItem('polishui-theme',nx);document.getElementById('themeIcon').className=nx==='light'?'fa-regular fa-moon':'fa-regular fa-sun';}
(function(){const s=localStorage.getItem('polishui-theme');if(s){document.documentElement.setAttribute('data-theme',s);document.getElementById('themeIcon').className=s==='light'?'fa-regular fa-moon':'fa-regular fa-sun';}})();
function toast(msg,type){const stack=document.getElementById('toast-stack');const t=document.createElement('div');t.className='toast';t.innerHTML=`<i class="fa-solid ${type==='success'?'fa-circle-check':'fa-info-circle'}" style="color:${type==='success'?'var(--success)':'var(--accent)'}"></i><span>${msg}</span>`;stack.appendChild(t);setTimeout(()=>t.remove(),2500);}

renderSidebar();renderLayerStack();
</script>
</body>
  </html>
